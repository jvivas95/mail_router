<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - MailRouter</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        </style>
    </head>
    <body class="bg-gray-950 text-gray-200 min-h-screen flex items-center justify-center">
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="fixed top-4 right-4 z-50 px-4 py-3 rounded-lg text-sm front-medium
                {% if category == 'success' %} bg-green-600 border border-green-700 text-green-300
                {% else %} bg-red-900 border border-red-700 text-red-300
                {% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}

        <div class="w-full max-w-sm px-6">
            <!-- logo -->
            <div class="flex flex-col items-center mb-10">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-2xl mb-4">
                    📨
                </div>
                <h1 class="text-2xl font-bold text-white mono">MailRouter</h1>
                <p class="text-sm text-gray-500 mt-1">Inicia sesión para continuar</p>
            </div>

            <!-- login form -->
            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                        Usuario
                    </label>
                    <input type="text" name="username" required autofocus placeholder="admin"
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                        Contraseña
                    </label>
                    <input type="password" name="password" required placeholder="••••••••"
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>

                <button type="submit"
                class="w-full mt-2 py-2.5 bg-indigo-500 text-white text-sm font-semibold rounded-lg transition-colors">
                    Iniciar Sesión
                </button>
            </form>

            <p class="text-center text-xs text-gray-600 mt-8">
                MailRouter - Sistema de gestión de correos
            </p>
        </div>
        
        <script src="{{ url_for('static', filename='js/login.js')}}"></script>
    </body>
</html>
