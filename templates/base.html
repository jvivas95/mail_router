<!-- templates/base.html -->
<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MailRouter{% endblock %}</title>
    <!-- Tailwind via CDN (sin instalación)-->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuente monospace para código y números -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
    
    <!-- Mensajes flash (success/error) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div id="flash-msg" class="fixed top-4 right-4 z-50 px-4 py-3 rounded-lg text-sm font-medium
                {% if category == 'success' %} bg-green-900 border border-green-700 text-green-300
                {% else %} bg-red-900 border border-red-700 text-red-300 {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <!-- Templates hijos -->
    {% block body %} {% endblock %}

</body>
</html>
